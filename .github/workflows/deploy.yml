name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; superseded batch pushes cancel the in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # dev/build_changelog.py reads full git history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Golden render test
        run: python tests/golden/run_golden.py

      - name: Answer checker test
        run: node tests/answer_checker/run_tests.js

      - name: Reader facet test
        run: node tests/reader_facets/run_tests.js

      - name: Build site
        run: bash build.sh

      - name: Assemble Pages artifact
        # The served site: master index, per-topic pages + audio, shared JS,
        # dev dashboards + their data, and queue state for dev/progress.html.
        run: |
          mkdir _site
          cp index.html wiki.html reader.html _site/
          rsync -a \
            --include='*/' \
            --include='*.html' \
            --include='*.mp3' \
            --include='*_data.js' \
            --exclude='*' \
            output/ _site/output/
          mkdir -p _site/lib
          cp -r lib/js _site/lib/js
          rsync -a \
            --include='*.html' \
            --include='*_data.json' \
            --exclude='*' \
            dev/ _site/dev/
          mkdir -p _site/queue
          cp queue/*.json _site/queue/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
