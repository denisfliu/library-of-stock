<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Progress</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #101418; color: #c8ccd1;
    max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem;
}
h1 { font-family: 'Linux Libertine', Georgia, serif; font-weight: normal; font-size: 1.6rem; color: #e0e0e0; border-bottom: 1px solid #3a3f47; padding-bottom: 0.3rem; margin-bottom: 0.3rem; }
.batch-name { font-size: 0.85rem; color: #808790; margin-bottom: 1rem; }
.back { font-size: 0.82rem; margin-bottom: 1rem; }
.back a { color: #6b9eff; text-decoration: none; }
.status-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat-card { background: #1a1f25; border: 1px solid #2a2f37; border-radius: 6px; padding: 0.8rem 1.2rem; flex: 1; min-width: 100px; text-align: center; }
.stat-card .number { font-size: 1.8rem; font-weight: 600; color: #e0e0e0; }
.stat-card .label { font-size: 0.75rem; color: #808790; margin-top: 0.2rem; }
.stat-card.done .number { color: #4caf50; }
.stat-card.queued .number { color: #6b9eff; }
.stat-card.active .number { color: #ce93d8; }
.stat-card.second .number { color: #ffb74d; }
.progress-bar-wrap { background: #1a1f25; border: 1px solid #2a2f37; border-radius: 4px; height: 24px; margin-bottom: 1.5rem; overflow: hidden; display: flex; }
.progress-bar-wrap .done { background: #4caf50; transition: width 0.5s; }
.progress-bar-wrap .active { background: #ce93d8; transition: width 0.5s; }
.progress-bar-wrap .queued { background: #2a3040; transition: width 0.5s; }
.progress-label { font-size: 0.78rem; color: #808790; margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
h2 { font-size: 1rem; color: #e0e0e0; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #2a2f37; padding-bottom: 0.2rem; }
.in-progress-list { list-style: none; margin-bottom: 1rem; }
.in-progress-list li { padding: 0.3rem 0.5rem; border-bottom: 1px solid #1a1f25; font-size: 0.82rem; display: flex; justify-content: space-between; }
.in-progress-list li .topic { color: #ce93d8; }
.in-progress-list li .meta { color: #555; font-size: 0.75rem; }
.category-breakdown { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.cat-pill { background: #1a1f25; border: 1px solid #2a2f37; border-radius: 12px; padding: 0.2rem 0.7rem; font-size: 0.78rem; }
.cat-pill .cat-count { color: #6b9eff; font-weight: 600; }
.log { background: #15191e; border: 1px solid #2a2f37; border-radius: 4px; padding: 0.5rem 0.8rem; max-height: 300px; overflow-y: auto; font-family: 'SF Mono', Consolas, monospace; font-size: 0.78rem; line-height: 1.6; }
.log .entry { border-bottom: 1px solid #1a1f25; padding: 0.1rem 0; display: flex; justify-content: space-between; }
.log .entry:last-child { border-bottom: none; }
.log .entry .topic { color: #4caf50; }
.log .entry .time { color: #555; font-size: 0.72rem; }
.log .entry .pass-tag { font-size: 0.68rem; padding: 0.05rem 0.3rem; border-radius: 3px; margin-left: 0.3rem; }
.log .entry .pass-tag.first { background: #1a2535; color: #6b9eff; }
.log .entry .pass-tag.second { background: #2a2518; color: #ffb74d; }
.refresh-info { font-size: 0.72rem; color: #555; margin-top: 1rem; text-align: center; }
.pulse { animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.no-batch { color: #555; font-style: italic; text-align: center; padding: 3rem; }
</style>
</head>
<body>
<div class="back"><a href="../index.html">&larr; Home</a></div>
<h1>Batch Progress <span id="live-dot" class="pulse" style="color:#4caf50;">●</span></h1>
<div class="batch-name" id="batch-name">Loading...</div>

<div class="status-bar">
    <div class="stat-card done"><div class="number" id="done-count">—</div><div class="label">Completed</div></div>
    <div class="stat-card active"><div class="number" id="active-count">—</div><div class="label">In Progress</div></div>
    <div class="stat-card queued"><div class="number" id="queued-count">—</div><div class="label">Queued</div></div>
</div>

<div class="progress-label"><span>Batch Progress</span><span id="progress-pct">—</span></div>
<div class="progress-bar-wrap">
    <div class="done" id="bar-done" style="width:0%"></div>
    <div class="active" id="bar-active" style="width:0%"></div>
    <div class="queued" id="bar-queued" style="width:0%"></div>
</div>

<h2>In Progress</h2>
<ul class="in-progress-list" id="in-progress-list"></ul>

<h2>Remaining by Category</h2>
<div id="cat-breakdown" class="category-breakdown"></div>

<h2>Completed</h2>
<div id="activity-log" class="log"><div style="color:#555">Loading...</div></div>

<div class="refresh-info">Auto-refreshes every 5s &middot; <span id="last-update">—</span></div>

<script>
async function fetchJSON(url) {
    try { const r = await fetch(url + '?t=' + Date.now()); return r.ok ? await r.json() : null; } catch { return null; }
}

async function update() {
    const batch = await fetchJSON('../queue/current_batch.json');

    if (!batch) {
        document.getElementById('batch-name').textContent = 'No active batch';
        document.getElementById('live-dot').style.display = 'none';
        return;
    }

    const queued = batch.queue || [];
    const inProgress = batch.in_progress || [];
    const completed = batch.completed || [];
    const total = queued.length + inProgress.length + completed.length;

    // Header
    document.getElementById('batch-name').textContent = (batch.name || 'Unnamed batch') + ' — started ' + (batch.started_at || '?');

    // Counts
    document.getElementById('done-count').textContent = completed.length;
    document.getElementById('active-count').textContent = inProgress.length;
    document.getElementById('queued-count').textContent = queued.length;

    // Progress bar
    if (total > 0) {
        document.getElementById('bar-done').style.width = (completed.length / total * 100) + '%';
        document.getElementById('bar-active').style.width = (inProgress.length / total * 100) + '%';
        document.getElementById('bar-queued').style.width = (queued.length / total * 100) + '%';
        document.getElementById('progress-pct').textContent =
            completed.length + ' / ' + total + ' (' + (completed.length / total * 100).toFixed(0) + '%)';
    }

    // Stop pulsing when done
    if (queued.length === 0 && inProgress.length === 0) {
        document.getElementById('live-dot').style.color = '#555';
        document.getElementById('live-dot').classList.remove('pulse');
    }

    // In progress list
    const ipList = document.getElementById('in-progress-list');
    if (inProgress.length === 0) {
        ipList.innerHTML = '<li style="color:#555;font-style:italic">None</li>';
    } else {
        ipList.innerHTML = inProgress.map(item =>
            `<li><span class="topic">${item.topic}</span><span class="meta">${item.pass_type || '?'} · started ${item.started_at || '?'}</span></li>`
        ).join('');
    }

    // Category breakdown (remaining queue only)
    const cats = {};
    queued.forEach(item => {
        const c = item.category || '?';
        const p = item.pass_type || '?';
        const key = c;
        cats[key] = cats[key] || {first: 0, second: 0};
        if (p === 'first') cats[key].first++;
        else cats[key].second++;
    });
    document.getElementById('cat-breakdown').innerHTML = Object.entries(cats)
        .sort((a,b) => (b[1].first + b[1].second) - (a[1].first + a[1].second))
        .map(([cat, c]) => {
            const parts = [];
            if (c.first) parts.push(`<span class="cat-count">${c.first}</span> 1st`);
            if (c.second) parts.push(`<span style="color:#ffb74d;font-weight:600">${c.second}</span> 2nd`);
            return `<span class="cat-pill">${cat}: ${parts.join(' · ')}</span>`;
        }).join('') || '<span style="color:#555">Queue empty</span>';

    // Completed log
    const logDiv = document.getElementById('activity-log');
    if (completed.length === 0) {
        logDiv.innerHTML = '<div style="color:#555">No completions yet</div>';
    } else {
        logDiv.innerHTML = completed.slice().reverse().map(item => {
            const passClass = item.pass_type === 'second' ? 'second' : 'first';
            return `<div class="entry"><span><span class="topic">${item.topic}</span><span class="pass-tag ${passClass}">${item.pass_type || '?'}</span></span><span class="time">${item.completed_at || ''}</span></div>`;
        }).join('');
    }

    document.getElementById('last-update').textContent = 'Last: ' + new Date().toLocaleTimeString();
}

update();
setInterval(update, 5000);
</script>
</body>
</html>
