<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Knowledge Guides</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #101418;
    color: #c8ccd1;
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
}
h1 {
    font-family: 'Linux Libertine', Georgia, serif;
    font-weight: normal;
    font-size: 1.6rem;
    color: #e0e0e0;
    border-bottom: 1px solid #3a3f47;
    padding-bottom: 0.3rem;
    margin-bottom: 1rem;
}
.search {
    width: 100%;
    padding: 0.5rem 0.8rem;
    font-size: 0.95rem;
    background: #1a1f25;
    color: #c8ccd1;
    border: 1px solid #3a3f47;
    border-radius: 4px;
    margin-bottom: 1rem;
    outline: none;
}
.search:focus { border-color: #6b9eff; }
.search::placeholder { color: #666; }
.guide-list { list-style: none; }
.guide-item {
    border: 1px solid #3a3f47;
    background: #1a1f25;
    margin-bottom: 0.5rem;
    border-radius: 4px;
    overflow: hidden;
}
.guide-item a {
    display: block;
    padding: 0.6rem 0.8rem;
    color: #6b9eff;
    text-decoration: none;
    font-size: 0.95rem;
}
.guide-item a:hover { background: #262d37; }
.guide-meta {
    font-size: 0.78rem;
    color: #808790;
    margin-top: 0.15rem;
}
.empty {
    color: #666;
    font-style: italic;
    padding: 1rem 0;
}
.count {
    font-size: 0.82rem;
    color: #808790;
    margin-bottom: 0.8rem;
}
</style>
</head>
<body>
<h1>Stock Knowledge Guides</h1>
<input class="search" type="text" placeholder="Search guides..." autofocus>
<div class="count"></div>
<ul class="guide-list"></ul>
<script>
const guides = [{"name": "Emily Carr", "path": "output/emily_carr_stock.html", "works": "5", "modified": "2026-03-18"}, {"name": "George Sand", "path": "output/george_sand_stock.html", "works": "7", "modified": "2026-03-18"}, {"name": "Kobo Abe", "path": "output/kobo_abe_stock.html", "works": "10", "modified": "2026-03-18"}, {"name": "Smetana", "path": "output/smetana_stock.html", "works": "5", "modified": "2026-03-18"}, {"name": "Thomas Cole", "path": "output/thomas_cole_stock.html", "works": "8", "modified": "2026-03-18"}, {"name": "Thomas Middleton", "path": "output/thomas_middleton_stock.html", "works": "7", "modified": "2026-03-18"}];
const list = document.querySelector('.guide-list');
const search = document.querySelector('.search');
const count = document.querySelector('.count');

function render(filter) {
    const q = (filter || '').toLowerCase();
    const filtered = guides.filter(g => g.name.toLowerCase().includes(q));
    count.textContent = filtered.length + ' guide' + (filtered.length !== 1 ? 's' : '');
    if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">No guides found.</li>';
        return;
    }
    list.innerHTML = filtered.map(g => `
        <li class="guide-item">
            <a href="${g.path}">
                ${g.name}
                <div class="guide-meta">${g.works} works &middot; ${g.modified}</div>
            </a>
        </li>
    `).join('');
}

search.addEventListener('input', e => render(e.target.value));
render('');
</script>
</body>
</html>
