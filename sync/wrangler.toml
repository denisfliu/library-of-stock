# Cloudflare Worker config for the reader sync backend.
# Setup steps: sync/README.md
name = "los-sync"
main = "worker.js"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "los-sync"
database_id = "REPLACE_WITH_OUTPUT_OF_wrangler_d1_create"

[vars]
# Origin of the GitHub Pages site — used for CORS and redirect validation.
ALLOWED_ORIGIN = "https://denisfliu.github.io"
# From the GitHub OAuth app (Settings -> Developer settings -> OAuth Apps).
GITHUB_CLIENT_ID = "REPLACE_WITH_CLIENT_ID"

# Secrets (never in this file) — set with `npx wrangler secret put <NAME>`:
#   GITHUB_CLIENT_SECRET  — from the same OAuth app
#   SESSION_SECRET        — random, e.g.: openssl rand -hex 32
