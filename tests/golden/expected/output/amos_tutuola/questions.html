<!DOCTYPE html>
<html lang="en" data-layout="desktop">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function () {
  var mq = window.matchMedia('(max-width: 700px), ((pointer: coarse) and (max-width: 1024px))');
  function apply() {
    var mode = mq.matches ? 'mobile' : 'desktop';
    if (document.documentElement.dataset.layout === mode) return;
    document.documentElement.dataset.layout = mode;
    window.dispatchEvent(new CustomEvent('loslayout', { detail: mode }));
  }
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else mq.addListener(apply);
  apply();
})();
</script>
<title>Questions: Amos Tutuola</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #101418;
    color: #c8ccd1;
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem;
    line-height: 1.5;
    font-size: 14px;
}
a { color: #6b9eff; text-decoration: none; }
a:hover { text-decoration: underline; }
h1 {
    font-family: 'Linux Libertine', Georgia, serif;
    font-size: 1.8rem;
    font-weight: normal;
    border-bottom: 1px solid #3a3f47;
    padding-bottom: 0.25rem;
    margin-bottom: 0.5rem;
    color: #e0e0e0;
}
.back-link {
    display: inline-block;
    margin-bottom: 1rem;
    font-size: 0.88rem;
}
.tab-bar {
    display: none;
    gap: 0.25rem;
    flex-wrap: wrap;
    margin: 0.8rem 0 0.2rem;
    border-bottom: 1px solid #3a3f47;
    padding-bottom: 0;
}
.tab-btn {
    background: none;
    border: 1px solid transparent;
    border-bottom: none;
    padding: 0.3rem 0.75rem;
    font-size: 0.82rem;
    color: #808790;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    margin-bottom: -1px;
}
.tab-btn:hover { color: #c8ccd1; }
.tab-btn.active {
    color: #6b9eff;
    border-color: #3a3f47;
    border-bottom-color: #101418;
    background: #101418;
}
.tab-stats {
    font-size: 0.85rem;
    color: #808790;
    margin: 0.6rem 0 1rem;
}
.q-loading, .qdata-error {
    color: #808790;
    font-style: italic;
    padding: 0.8rem 0;
    font-size: 0.9rem;
}
.qdata-error a { color: #6b9eff; }
h2 {
    font-family: 'Linux Libertine', Georgia, serif;
    font-size: 1.3rem;
    font-weight: normal;
    border-bottom: 1px solid #3a3f47;
    padding-bottom: 0.15rem;
    margin-bottom: 0.8rem;
    margin-top: 1.5rem;
    color: #e0e0e0;
}
.question {
    background: #1a1f25;
    border: 1px solid #3a3f47;
    margin-bottom: 0.8rem;
    padding: 0;
    border-radius: 4px;
    overflow: hidden;
}
.q-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.35rem 0.8rem;
    background: #1f252d;
    border-bottom: 1px solid #3a3f47;
    font-size: 0.82rem;
}
.q-num { font-weight: bold; color: #6b9eff; min-width: 2rem; }
.q-source { color: #c8ccd1; }
.q-meta { color: #808790; margin-left: auto; }
.q-text { padding: 0.6rem 0.8rem; font-size: 0.9rem; line-height: 1.6; }
.q-text b { color: #e0e0e0; }
.q-answer { padding: 0.4rem 0.8rem; font-size: 0.85rem; border-top: 1px solid #2a2f37; color: #9aa0a7; }
.q-answer b, .q-answer u { color: #6bcf8e; }
.b-part { border-top: 1px solid #2a2f37; }
.b-part-text { padding: 0.5rem 0.8rem; font-size: 0.9rem; line-height: 1.6; }
mark { background: #5a4a00; color: #ffd54f; border-radius: 2px; padding: 0 2px; }

/* --- mobile core (theme.mobile_core_css) --- */
.m-only { display: none !important; }
html[data-layout="mobile"] .m-only { display: revert !important; }
html[data-layout="mobile"] .d-only { display: none !important; }
html[data-layout="mobile"] body { padding-left: 0.9rem; padding-right: 0.9rem; }
html[data-layout="mobile"] button,
html[data-layout="mobile"] select,
html[data-layout="mobile"] input[type="checkbox"] + label {
    min-height: 40px;
}
html[data-layout="mobile"] input[type="text"],
html[data-layout="mobile"] input[type="search"],
html[data-layout="mobile"] input[type="number"] {
    font-size: 16px; /* prevents iOS focus zoom */
}
.tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
html[data-layout="mobile"] img { max-width: 100%; height: auto; }

html[data-layout="mobile"] .tab-btn { padding: 0.55rem 0.8rem; font-size: 0.88rem; }
</style>
</head>
<body>
<div class="back-link"><a href="../../wiki.html">&larr; Wiki</a> · <a href="stock.html">Study guide</a></div>
<h1>Questions: Amos Tutuola</h1>
<div class="tab-bar">
<button class="tab-btn active" onclick="showTab(0)">Amos Tutuola (d7–10)</button>
</div>
<div class="tab-panel" id="tab-0" style="display:block"><p class="q-loading">Loading questions…</p></div>

<script src="../../lib/js/qdata.js"></script>
<script>
const TOPIC_SLUG = "amos_tutuola";

const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')(?![^<]*>)', 'gi');
    return String(text).replace(re, '<mark>$1</mark>');
}

function header(prefix, i, q) {
    const set = (q.set || {});
    return `
            <div class="q-header">
                <span class="q-num">${prefix}${i}</span>
                <span class="q-source">${esc(set.name || '')} (${set.year ?? ''})</span>
                <span class="q-meta">Diff ${q.difficulty ?? ''} &middot; ${esc(q.category || '')}</span>
            </div>`;
}

function panelHtml(entry) {
    const query = entry.mentions ? entry.query_string : '';
    const tossups = entry.tossups.map((t, i) => `
        <div class="question">${header('T', i + 1, t)}
            <div class="q-text">${highlight(t.question || '', query)}</div>
            <div class="q-answer">ANSWER: ${t.answer || ''}</div>
        </div>`).join('');
    const bonuses = entry.bonuses.map((b, i) => {
        const parts = (b.parts || []).map((part, j) => `
            <div class="b-part">
                <div class="b-part-text">[10] ${highlight(part, query)}</div>
                <div class="q-answer">ANSWER: ${(b.answers || [])[j] || ''}</div>
            </div>`).join('');
        return `
        <div class="question">${header('B', i + 1, b)}
            <div class="q-text">${highlight(b.leadin || '', query)}</div>
            ${parts}
        </div>`;
    }).join('');
    const nt = entry.tossups.length, nb = entry.bonuses.length;
    const stats = `${nt} tossup${nt !== 1 ? 's' : ''} &middot; ${nb} bonus${nb !== 1 ? 'es' : ''}`;
    const empty = '<p style="color:#808790;font-style:italic;padding:0.5rem 0;">No questions.</p>';
    return `
<div class="tab-stats">${stats}</div>
<h2>Tossups</h2>
${tossups || empty}
<h2>Bonuses</h2>
${bonuses || empty}`;
}

qdataFetch('topic_questions/' + TOPIC_SLUG + '.json').then(entries => {
    entries.forEach((entry, i) => {
        const panel = document.getElementById('tab-' + i);
        if (panel) panel.innerHTML = panelHtml(entry);
    });
}).catch(err => {
    document.querySelectorAll('.tab-panel').forEach(p => {
        p.innerHTML = qdataErrorHtml(err);
    });
});

function showTab(i) {
    document.querySelectorAll('.tab-panel').forEach((p, j) => p.style.display = j === i ? 'block' : 'none');
    document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
}
</script>
</body>
</html>
